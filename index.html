<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Tokyo Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }

#ui {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 10;
}

#title {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 2px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  text-transform: uppercase;
}

#panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  pointer-events: auto;
  padding: 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7) 30%);
}

#buttons {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#buttons::-webkit-scrollbar { display: none; }

.btn {
  flex-shrink: 0;
  padding: 8px 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s;
  white-space: nowrap;
}
.btn:hover, .btn.active {
  background: rgba(255,50,50,0.4);
  border-color: rgba(255,100,100,0.6);
}

#label {
  position: absolute;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  pointer-events: none;
  transition: opacity 0.3s;
  background: rgba(0,0,0,0.5);
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  transform: translate(-50%, -100%);
  display: none;
}

#reset-btn {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  pointer-events: auto;
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
}

#loading {
  position: fixed; inset: 0;
  background: #0a0a1a;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px; letter-spacing: 3px;
  z-index: 100;
  transition: opacity 0.5s;
}
</style>
</head>
<body>

<div id="loading">TOKYO</div>
<div id="ui">
  <div id="title">🗼 Tokyo</div>
  <button id="reset-btn" onclick="resetCamera()">↻</button>
  <div id="panel"><div id="buttons"></div></div>
  <div id="label"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const LANDMARKS = [
  { name: "🗼 Tokyo Tower", x: 30, z: -20, h: 18, color: 0xff4444, r: 0.6 },
  { name: "⛩️ Senso-ji", x: 55, z: -40, h: 8, color: 0xcc3333, r: 1.2 },
  { name: " Shibuya Crossing", x: -30, z: 5, h: 6, color: 0x44aaff, r: 1.0 },
  { name: "📡 Skytree", x: 65, z: -30, h: 25, color: 0x6688cc, r: 0.5 },
  { name: "🌳 Meiji Shrine", x: -35, z: -15, h: 7, color: 0x44aa44, r: 1.5 },
  { name: "🏯 Imperial Palace", x: 15, z: -15, h: 6, color: 0xddaa44, r: 1.8 },
  { name: "💡 Akihabara", x: 35, z: -10, h: 10, color: 0xff66ff, r: 1.0 },
  { name: "🏙️ Shinjuku", x: -45, z: -5, h: 14, color: 0x44ffaa, r: 1.2 },
];

let scene, camera, renderer, controls;
let animating = false;
let activeBtn = null;
const label = document.getElementById('label');
const landmarkMeshes = [];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.004);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 80, 100);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxPolarAngle = Math.PI / 2.2;
  controls.minDistance = 20;
  controls.maxDistance = 200;
  controls.target.set(0, 0, -10);

  // Lights
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(50, 80, 50);
  dir.castShadow = true;
  scene.add(dir);
  const point = new THREE.PointLight(0xff4444, 0.5, 100);
  point.position.set(30, 20, -20);
  scene.add(point);

  buildCity();
  buildLandmarks();
  buildWater();
  buildRoads();
  buildUI();

  setTimeout(() => {
    document.getElementById('loading').style.opacity = 0;
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
  }, 800);

  animate();
}

function buildCity() {
  // Ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 300),
    new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.9 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid glow
  const grid = new THREE.GridHelper(300, 60, 0x1a1a2e, 0x1a1a2e);
  grid.position.y = 0.05;
  scene.add(grid);

  // Buildings
  const buildingColors = [0x1a1a2e, 0x16162a, 0x1e1e35, 0x222240, 0x181830];
  for (let i = 0; i < 600; i++) {
    const w = Math.random() * 3 + 1;
    const d = Math.random() * 3 + 1;
    const h = Math.random() * 12 + 2;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({
      color: buildingColors[Math.floor(Math.random() * buildingColors.length)],
      roughness: 0.7,
      emissive: new THREE.Color(0x222244),
      emissiveIntensity: Math.random() * 0.15,
    });
    const mesh = new THREE.Mesh(geo, mat);
    let px, pz;
    do {
      px = (Math.random() - 0.5) * 250;
      pz = (Math.random() - 0.5) * 250;
    } while (LANDMARKS.some(l => Math.abs(px - l.x) < l.r * 3 + 3 && Math.abs(pz - l.z) < l.r * 3 + 3));
    mesh.position.set(px, h / 2, pz);
    mesh.castShadow = true;
    scene.add(mesh);
  }

  // Lit windows (small emissive boxes on some buildings)
  for (let i = 0; i < 200; i++) {
    const px = (Math.random() - 0.5) * 240;
    const pz = (Math.random() - 0.5) * 240;
    const py = Math.random() * 8 + 1;
    const wGeo = new THREE.BoxGeometry(0.3, 0.3, 0.05);
    const wMat = new THREE.MeshStandardMaterial({
      color: 0xffeecc,
      emissive: 0xffeeaa,
      emissiveIntensity: 0.8,
    });
    const wMesh = new THREE.Mesh(wGeo, wMat);
    wMesh.position.set(px, py, pz);
    scene.add(wMesh);
  }
}

function buildLandmarks() {
  LANDMARKS.forEach((l, i) => {
    const group = new THREE.Group();

    if (l.name.includes("Tokyo Tower") || l.name.includes("Skytree")) {
      // Tower shape
      const tower = new THREE.Mesh(
        new THREE.CylinderGeometry(l.r * 0.15, l.r * 0.5, l.h, 8),
        new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.3, roughness: 0.4 })
      );
      tower.position.y = l.h / 2;
      tower.castShadow = true;
      group.add(tower);
      // Top glow
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(l.r * 0.3, 16, 16),
        new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.8 })
      );
      glow.position.y = l.h;
      group.add(glow);
    } else if (l.name.includes("Imperial")) {
      // Palace - wide base
      const base = new THREE.Mesh(
        new THREE.BoxGeometry(l.r * 4, 2, l.r * 4),
        new THREE.MeshStandardMaterial({ color: 0x887744, roughness: 0.6 })
      );
      base.position.y = 1;
      group.add(base);
      const top = new THREE.Mesh(
        new THREE.ConeGeometry(l.r * 2, l.h - 2, 4),
        new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.2 })
      );
      top.position.y = 2 + (l.h - 2) / 2;
      top.rotation.y = Math.PI / 4;
      group.add(top);
      // Moat
      const moat = new THREE.Mesh(
        new THREE.RingGeometry(l.r * 2.2, l.r * 3, 32),
        new THREE.MeshStandardMaterial({ color: 0x2244aa, emissive: 0x1133aa, emissiveIntensity: 0.2, side: THREE.DoubleSide })
      );
      moat.rotation.x = -Math.PI / 2;
      moat.position.y = 0.1;
      group.add(moat);
    } else if (l.name.includes("Shrine") || l.name.includes("Meiji")) {
      // Shrine - torii gate style
      const pillar = (x) => {
        const p = new THREE.Mesh(
          new THREE.BoxGeometry(0.4, l.h, 0.4),
          new THREE.MeshStandardMaterial({ color: 0xcc2222, emissive: 0xcc2222, emissiveIntensity: 0.15 })
        );
        p.position.set(x, l.h / 2, 0);
        return p;
      };
      group.add(pillar(-1.2));
      group.add(pillar(1.2));
      const beam = new THREE.Mesh(
        new THREE.BoxGeometry(3.5, 0.4, 0.4),
        new THREE.MeshStandardMaterial({ color: 0xcc2222, emissive: 0xcc2222, emissiveIntensity: 0.15 })
      );
      beam.position.y = l.h - 0.5;
      group.add(beam);
      const beam2 = beam.clone();
      beam2.position.y = l.h - 1.5;
      beam2.scale.x = 0.8;
      group.add(beam2);
      // Green area
      const green = new THREE.Mesh(
        new THREE.CircleGeometry(l.r * 1.5, 16),
        new THREE.MeshStandardMaterial({ color: 0x225522, emissive: 0x113311, emissiveIntensity: 0.1 })
      );
      green.rotation.x = -Math.PI / 2;
      green.position.y = 0.1;
      group.add(green);
    } else if (l.name.includes("Shibuya")) {
      // Crossing - flat illuminated area
      const cross = new THREE.Mesh(
        new THREE.PlaneGeometry(l.r * 3, l.r * 3),
        new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.4, side: THREE.DoubleSide })
      );
      cross.rotation.x = -Math.PI / 2;
      cross.position.y = 0.15;
      group.add(cross);
      // Surrounding buildings
      for (let j = 0; j < 6; j++) {
        const b = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 5 + Math.random() * 5, 1.5),
          new THREE.MeshStandardMaterial({ color: 0x223344, emissive: 0x224466, emissiveIntensity: 0.2 })
        );
        const angle = (j / 6) * Math.PI * 2;
        b.position.set(Math.cos(angle) * 3, b.geometry.parameters.height / 2, Math.sin(angle) * 3);
        group.add(b);
      }
    } else {
      // Default landmark - glowing pillar
      const pillar = new THREE.Mesh(
        new THREE.BoxGeometry(l.r * 1.5, l.h, l.r * 1.5),
        new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.2, roughness: 0.5 })
      );
      pillar.position.y = l.h / 2;
      pillar.castShadow = true;
      group.add(pillar);
    }

    // Label pin
    const pin = new THREE.Mesh(
      new THREE.SphereGeometry(0.8, 16, 16),
      new THREE.MeshStandardMaterial({ color: l.color, emissive: l.color, emissiveIntensity: 0.6 })
    );
    pin.position.y = l.h + 2;
    pin.userData = { landmarkIndex: i };
    group.add(pin);
    landmarkMeshes.push(pin);

    // Light at landmark
    const light = new THREE.PointLight(l.color, 0.5, 30);
    light.position.set(0, l.h + 3, 0);
    group.add(light);

    group.position.set(l.x, 0, l.z);
    scene.add(group);
  });
}

function buildWater() {
  // Tokyo Bay (south-east side)
  const water = new THREE.Mesh(
    new THREE.PlaneGeometry(120, 80),
    new THREE.MeshStandardMaterial({ color: 0x0a1a3a, emissive: 0x0a1530, emissiveIntensity: 0.3, transparent: true, opacity: 0.8 })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.set(80, 0.1, 60);
  scene.add(water);

  // Sumida River
  const river = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 180),
    new THREE.MeshStandardMaterial({ color: 0x0a1a3a, emissive: 0x0a1530, emissiveIntensity: 0.3, transparent: true, opacity: 0.7 })
  );
  river.rotation.x = -Math.PI / 2;
  river.rotation.z = 0.3;
  river.position.set(50, 0.12, -20);
  scene.add(river);
}

function buildRoads() {
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a22, emissive: 0x111122, emissiveIntensity: 0.1 });
  // Main arteries
  const roads = [
    { x: 0, z: -10, w: 200, d: 2, ry: 0.15 },
    { x: 0, z: 0, w: 200, d: 2, ry: 0 },
    { x: 0, z: -30, w: 200, d: 2, ry: -0.1 },
    { x: 0, z: 15, w: 200, d: 2.5, ry: 0.05 },
    { x: -20, z: 0, w: 2, d: 200, ry: 0 },
    { x: 10, z: 0, w: 2, d: 200, ry: 0.05 },
    { x: 40, z: 0, w: 2, d: 180, ry: -0.05 },
    { x: -40, z: 0, w: 2, d: 160, ry: 0.1 },
  ];
  roads.forEach(r => {
    const road = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.d), roadMat);
    road.rotation.x = -Math.PI / 2;
    road.rotation.z = r.ry;
    road.position.set(r.x, 0.08, r.z);
    scene.add(road);
  });

  // Train line (Yamanote-like loop)
  const curve = new THREE.EllipseCurve(-5, -10, 55, 45, 0, Math.PI * 2, false);
  const points = curve.getPoints(80);
  const lineGeo = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, 0.15, p.y)));
  const lineMat = new THREE.LineBasicMaterial({ color: 0x44aa44, transparent: true, opacity: 0.4 });
  const loop = new THREE.LineLoop(lineGeo, lineMat);
  scene.add(loop);
}

function buildUI() {
  const container = document.getElementById('buttons');
  LANDMARKS.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = l.name;
    btn.onclick = () => flyTo(l, btn);
    container.appendChild(btn);
  });
}

function flyTo(l, btn) {
  if (activeBtn) activeBtn.classList.remove('active');
  activeBtn = btn;
  btn.classList.add('active');

  const targetPos = new THREE.Vector3(l.x, 0, l.z);
  const camOffset = new THREE.Vector3(l.x + 15, l.h + 20, l.z + 25);
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const startTime = performance.now();
  const duration = 1200;

  animating = true;

  function anim() {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, camOffset, ease);
    controls.target.lerpVectors(startTarget, targetPos, ease);
    controls.update();

    if (t < 1) {
      requestAnimationFrame(anim);
    } else {
      animating = false;
    }
  }
  anim();
}

function resetCamera() {
  if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const endPos = new THREE.Vector3(0, 80, 100);
  const endTarget = new THREE.Vector3(0, 0, -10);
  const startTime = performance.now();
  const duration = 1000;
  animating = true;

  function anim() {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    camera.position.lerpVectors(startPos, endPos, ease);
    controls.target.lerpVectors(startTarget, endTarget, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(anim);
    else animating = false;
  }
  anim();
}

function updateLabels() {
  let closestDist = Infinity;
  let closestLandmark = null;

  landmarkMeshes.forEach((pin, i) => {
    const pos = new THREE.Vector3();
    pin.getWorldPosition(pos);
    const screen = pos.clone().project(camera);

    if (screen.z < 1 && screen.z > -1) {
      const x = (screen.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screen.y * 0.5 + 0.5) * window.innerHeight;
      const dist = camera.position.distanceTo(pos);
      if (dist < closestDist) {
        closestDist = dist;
        closestLandmark = { x, y, name: LANDMARKS[i].name, dist };
      }
    }
  });

  if (closestLandmark && closestLandmark.dist < 60) {
    label.style.display = 'block';
    label.style.left = closestLandmark.x + 'px';
    label.style.top = (closestLandmark.y - 15) + 'px';
    label.textContent = closestLandmark.name;
    label.style.opacity = Math.max(0, 1 - closestLandmark.dist / 60);
  } else {
    label.style.display = 'none';
  }
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (!animating) updateLabels();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
