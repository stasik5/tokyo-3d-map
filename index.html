<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Tokyo — Real Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:none}
canvas{display:block}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;font-size:1.2em;transition:opacity 0.5s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#ff4500;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#controls{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,26,.92);backdrop-filter:blur(12px);padding:8px;z-index:10;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-height:40vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.1)}
#controls button{background:rgba(255,255,255,.08);color:#e0e0e0;border:1px solid rgba(255,255,255,.15);padding:8px 12px;border-radius:8px;font-size:.8em;cursor:pointer;transition:all .2s;white-space:nowrap;min-width:80px}
#controls button:hover,#controls button:active{background:rgba(255,255,255,.18);transform:scale(1.03)}
#controls button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
#resetBtn{background:rgba(255,69,0,.2)!important;border-color:rgba(255,69,0,.4)!important;color:#ff6b35!important}
#info{position:fixed;top:10px;left:10px;color:rgba(255,255,255,.7);font-size:.75em;z-index:10;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.8)}
#label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.4em;font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.8);opacity:0;transition:opacity .4s;pointer-events:none;z-index:10}
#label.show{opacity:1}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Loading Tokyo…</div></div>
<div id="info">🗺️ 3D Tokyo — Real OSM Data</div>
<div id="label"></div>
<div id="controls"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="mapdata.js"></script>
<script>
(function(){
const S=MAP_DATA;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1a);
scene.fog=new THREE.FogExp2(0x0a0a1a,0.00015);

const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,20000);
camera.position.set(0,800,1200);

const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=false;
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.maxPolarAngle=Math.PI*0.48;
controls.minDistance=50;
controls.maxDistance=4000;
controls.target.set(0,0,0);
controls.touches={ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};

// Lighting
const ambient=new THREE.AmbientLight(0x1a1a3a,0.6);
scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0x334477,0.3);
dirLight.position.set(-500,1000,500);
scene.add(dirLight);
const hemi=new THREE.HemisphereLight(0x111133,0x080810,0.4);
scene.add(hemi);

// Ground plane
const groundGeo=new THREE.PlaneGeometry(14000,14000);
const groundMat=new THREE.MeshStandardMaterial({color:0x0d0d1a,roughness:0.95});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.position.y=-0.5;
scene.add(ground);

// Colors for building types
const typeColors={
    'yes':{base:0x2a2a3a,emissive:0x0a0a15},
    'commercial':{base:0x2d3040,emissive:0x0d1020},
    'retail':{base:0x2d2a35,emissive:0x0d0a15},
    'apartments':{base:0x282838,emissive:0x08081a},
    'office':{base:0x303545,emissive:0x101525},
    'hotel':{base:0x352a35,emissive:0x150a15},
    'house':{base:0x252530,emissive:0x050510},
    'university':{base:0x2a3030,emissive:0x0a1010},
    'school':{base:0x2a2d30,emissive:0x0a0d10},
    'roof':{base:0x222230,emissive:0x020210},
};

function getColor(btype){
    const c=typeColors[btype]||typeColors['yes'];
    // Add slight variation
    const v=0.9+Math.random()*0.2;
    return{
        base:new THREE.Color(c.base).multiplyScalar(v),
        emissive:new THREE.Color(c.emissive).multiplyScalar(v*1.5)
    };
}

// Build real buildings
const buildingGroup=new THREE.Group();
const windowGeo=new THREE.PlaneGeometry(1.2,1.8);

let totalVerts=0;
const MAX_VERTS=2000000;

for(let i=0;i<S.buildings.length&&totalVerts<MAX_VERTS;i++){
    const b=S.buildings[i];
    const pts=b.p;
    if(pts.length<3)continue;

    const colors=getColor(b.t);
    const h=b.h||10;

    // Create shape from polygon
    const shape=new THREE.Shape();
    shape.moveTo(pts[0][0],-pts[0][1]);
    for(let j=1;j<pts.length;j++){
        shape.lineTo(pts[j][0],-pts[j][1]);
    }
    shape.closePath();

    try{
        const geo=new THREE.ExtrudeGeometry(shape,{
            depth:h,
            bevelEnabled:false,
            steps:1
        });
        
        const mat=new THREE.MeshStandardMaterial({
            color:colors.base,
            emissive:colors.emissive,
            emissiveIntensity:0.4+Math.random()*0.3,
            roughness:0.85,
            metalness:0.1
        });

        const mesh=new THREE.Mesh(geo,mat);
        mesh.rotation.x=-Math.PI/2;
        mesh.position.y=0;
        buildingGroup.add(mesh);
        totalVerts+=geo.attributes.position.count;

        // Window lights on taller buildings
        if(h>20&&totalVerts<MAX_VERTS*0.8){
            const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
            const cz=pts.reduce((s,p)=>s+p[1],0)/pts.length;
            const windowMat=new THREE.MeshBasicMaterial({
                color:new THREE.Color().setHSL(0.12+Math.random()*0.08,0.6,0.6),
                transparent:true,
                opacity:0.5+Math.random()*0.4
            });
            const wRows=Math.min(Math.floor(h/5),8);
            for(let row=0;row<wRows;row++){
                const y=row*5+3;
                for(let side=0;side<pts.length-1;side++){
                    if(Math.random()>0.4)continue;
                    const px=(pts[side][0]+pts[side+1][0])/2;
                    const pz=(pts[side][1]+pts[side+1][1])/2;
                    const w=new THREE.Mesh(windowGeo,windowMat);
                    const dx=px-cx,dz=pz-cz;
                    const len=Math.sqrt(dx*dx+dz*dz);
                    if(len<1)continue;
                    w.position.set(px,y,pz);
                    w.lookAt(px+dx/len*10,y,pz+dz/len*10);
                    buildingGroup.add(w);
                }
            }
        }
    }catch(e){}
}
scene.add(buildingGroup);

// Roads
const roadGroup=new THREE.Group();
for(const r of S.roads){
    if(r.p.length<2)continue;
    const pts=r.p.map(p=>new THREE.Vector3(p[0],0.05,-p[1]));
    const curve=new THREE.CatmullRomCurve3(pts,false);
    const segs=Math.max(2,Math.floor(curve.getLength()/20));
    const tubeGeo=new THREE.TubeGeometry(curve,segs,r.w*0.5,3,false);
    const roadMat=new THREE.MeshStandardMaterial({
        color:r.w>6?0x1a1a28:0x141420,
        emissive:0x060610,
        emissiveIntensity:r.w>6?0.5:0.2,
        roughness:0.7
    });
    roadGroup.add(new THREE.Mesh(tubeGeo,roadMat));
}
scene.add(roadGroup);

// Water
for(const w of S.water){
    const shape=new THREE.Shape();
    shape.moveTo(w.p[0][0],-w.p[0][1]);
    for(let i=1;i<w.p.length;i++)shape.lineTo(w.p[i][0],-w.p[i][1]);
    shape.closePath();
    const geo=new THREE.ShapeGeometry(shape);
    const mat=new THREE.MeshStandardMaterial({
        color:0x0a1525,
        emissive:0x051020,
        emissiveIntensity:0.8,
        transparent:true,
        opacity:0.85,
        roughness:0.3,
        metalness:0.6
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.rotation.x=-Math.PI/2;
    mesh.position.y=0.1;
    scene.add(mesh);
}

// Landmarks — distinctive shapes
const landmarkGroup=new THREE.Group();
const landmarkPositions=[];

for(const[key,lm]of Object.entries(S.landmarks)){
    const x=lm.x,z=-lm.z,h=lm.h;
    const color=new THREE.Color(lm.color);
    const group=new THREE.Group();
    group.position.set(x,0,z);

    if(key==='tokyo_tower'){
        // Triangular lattice tower - red
        const coneGeo=new THREE.ConeGeometry(25,Math.min(h,250),4);
        const coneMat=new THREE.MeshStandardMaterial({color:0xff3300,emissive:0xff2200,emissiveIntensity:0.5,roughness:0.5});
        group.add(new THREE.Mesh(coneGeo,coneMat));
        group.children[0].position.y=Math.min(h,250)/2;
        // Antenna
        const antGeo=new THREE.CylinderGeometry(1,2,80,6);
        group.add(new THREE.Mesh(antGeo,coneMat));
        group.children[1].position.y=Math.min(h,250)+40;
        // Glow
        const glowGeo=new THREE.SphereGeometry(40,16,16);
        const glowMat=new THREE.MeshBasicMaterial({color:0xff4500,transparent:true,opacity:0.15});
        group.add(new THREE.Mesh(glowGeo,glowMat));
        group.children[2].position.y=Math.min(h,250)/2;
    }else if(key==='skytree'){
        // Tall slim tower
        const bodyGeo=new THREE.CylinderGeometry(8,30,Math.min(h,400),6);
        const bodyMat=new THREE.MeshStandardMaterial({color:0x88ccff,emissive:0x4488cc,emissiveIntensity:0.6,roughness:0.3,metalness:0.5});
        group.add(new THREE.Mesh(bodyGeo,bodyMat));
        group.children[0].position.y=Math.min(h,400)/2;
        // Observation deck
        const deckGeo=new THREE.CylinderGeometry(35,35,15,8);
        const deckMat=new THREE.MeshStandardMaterial({color:0x6699cc,emissive:0x3366aa,emissiveIntensity:0.7});
        group.add(new THREE.Mesh(deckGeo,deckMat));
        group.children[1].position.y=250;
        // Antenna
        const antGeo=new THREE.CylinderGeometry(0.5,3,120,6);
        group.add(new THREE.Mesh(antGeo,bodyMat));
        group.children[2].position.y=Math.min(h,400)+60;
        // Glow
        const glowGeo=new THREE.SphereGeometry(50,16,16);
        const glowMat=new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.12});
        group.add(new THREE.Mesh(glowGeo,glowMat));
        group.children[3].position.y=300;
    }else if(key==='sensoji'){
        // Temple - low wide building with curved roof feel
        const baseGeo=new THREE.BoxGeometry(60,12,40);
        const baseMat=new THREE.MeshStandardMaterial({color:0xcc5533,emissive:0x882211,emissiveIntensity:0.4});
        group.add(new THREE.Mesh(baseGeo,baseMat));
        group.children[0].position.y=6;
        // Roof (wider)
        const roofGeo=new THREE.BoxGeometry(70,4,50);
        const roofMat=new THREE.MeshStandardMaterial({color:0x333344,emissive:0x111122,emissiveIntensity:0.3});
        group.add(new THREE.Mesh(roofGeo,roofMat));
        group.children[1].position.y=14;
        // Gate
        const gateGeo=new THREE.BoxGeometry(30,18,8);
        group.add(new THREE.Mesh(gateGeo,baseMat));
        group.children[2].position.set(0,9,30);
    }else if(key==='shibuya'){
        // Intersection - glowing ground plane
        const crossGeo=new THREE.PlaneGeometry(80,80);
        const crossMat=new THREE.MeshBasicMaterial({color:0xe040fb,transparent:true,opacity:0.3});
        const cross=new THREE.Mesh(crossGeo,crossMat);
        cross.rotation.x=-Math.PI/2;
        cross.position.y=1;
        group.add(cross);
        // Surrounding buildings glow
        const glowGeo=new THREE.SphereGeometry(60,16,16);
        const glowMat=new THREE.MeshBasicMaterial({color:0xe040fb,transparent:true,opacity:0.08});
        group.add(new THREE.Mesh(glowGeo,glowMat));
        group.children[1].position.y=30;
    }else if(key==='meiji'){
        // Torii gate
        const postMat=new THREE.MeshStandardMaterial({color:0xcc2222,emissive:0x881111,emissiveIntensity:0.5});
        // Left post
        const lpGeo=new THREE.BoxGeometry(3,25,3);
        const lp=new THREE.Mesh(lpGeo,postMat);lp.position.set(-15,12.5,0);group.add(lp);
        // Right post
        const rp=new THREE.Mesh(lpGeo,postMat);rp.position.set(15,12.5,0);group.add(rp);
        // Top bar
        const tbGeo=new THREE.BoxGeometry(40,3,4);
        const tb=new THREE.Mesh(tbGeo,postMat);tb.position.y=26;group.add(tb);
        // Greenery
        const treeGeo=new THREE.SphereGeometry(30,8,8);
        const treeMat=new THREE.MeshStandardMaterial({color:0x1a5a1a,emissive:0x0a3a0a,emissiveIntensity:0.4});
        const tree=new THREE.Mesh(treeGeo,treeMat);tree.position.y=15;tree.scale.set(3,1,3);group.add(tree);
    }else if(key==='imperial'){
        // Palace walls + garden
        const wallMat=new THREE.MeshStandardMaterial({color:0xccaa44,emissive:0x665522,emissiveIntensity:0.3});
        // Outer wall ring
        const wallGeo=new THREE.TorusGeometry(80,3,4,24);
        const wall=new THREE.Mesh(wallGeo,wallMat);
        wall.rotation.x=-Math.PI/2;wall.position.y=6;
        group.add(wall);
        // Inner garden
        const gardenGeo=new THREE.PlaneGeometry(100,100);
        const gardenMat=new THREE.MeshStandardMaterial({color:0x1a4a1a,emissive:0x0a2a0a,emissiveIntensity:0.3});
        const garden=new THREE.Mesh(gardenGeo,gardenMat);
        garden.rotation.x=-Math.PI/2;garden.position.y=0.3;
        group.add(garden);
        // Main building
        const palaceGeo=new THREE.BoxGeometry(40,10,30);
        const palace=new THREE.Mesh(palaceGeo,wallMat);palace.position.y=5;
        group.add(palace);
    }else if(key==='akihabara'){
        // Neon district - tall glowing buildings
        const neonColors=[0xff0066,0x00ffaa,0xffaa00,0x0066ff,0xff00ff,0x00ffff];
        for(let i=0;i<6;i++){
            const bh=15+Math.random()*40;
            const bw=8+Math.random()*15;
            const bGeo=new THREE.BoxGeometry(bw,bh,bw);
            const nc=neonColors[i%neonColors.length];
            const bMat=new THREE.MeshStandardMaterial({
                color:nc,
                emissive:nc,
                emissiveIntensity:0.6+Math.random()*0.3,
                roughness:0.4
            });
            const bMesh=new THREE.Mesh(bGeo,bMat);
            bMesh.position.set((i-3)*18,bh/2,(Math.random()-0.5)*30);
            group.add(bMesh);
        }
        // Neon glow
        const glowGeo=new THREE.SphereGeometry(80,16,16);
        const glowMat=new THREE.MeshBasicMaterial({color:0xe91e63,transparent:true,opacity:0.06});
        group.add(new THREE.Mesh(glowGeo,glowMat));
        group.children[group.children.length-1].position.y=40;
    }else if(key==='shinjuku'){
        // Dense tall buildings cluster
        const mat1=new THREE.MeshStandardMaterial({color:0x5544aa,emissive:0x2211aa,emissiveIntensity:0.5,roughness:0.4,metalness:0.3});
        for(let i=0;i<8;i++){
            const bh=60+Math.random()*140;
            const bw=15+Math.random()*25;
            const bGeo=new THREE.BoxGeometry(bw,bh,bw);
            const cm=mat1.clone();
            cm.emissiveIntensity=0.3+Math.random()*0.5;
            const bm=new THREE.Mesh(bGeo,cm);
            bm.position.set((i-4)*25+Math.random()*10,bh/2,(Math.random()-0.5)*40);
            group.add(bm);
        }
        const glowGeo=new THREE.SphereGeometry(100,16,16);
        const glowMat=new THREE.MeshBasicMaterial({color:0x7c4dff,transparent:true,opacity:0.06});
        group.add(new THREE.Mesh(glowGeo,glowMat));
        group.children[group.children.length-1].position.y=80;
    }

    // Beacon light on top
    const beaconGeo=new THREE.SphereGeometry(3,8,8);
    const beaconMat=new THREE.MeshBasicMaterial({color:color.clone(),transparent:true,opacity:0.9});
    const beacon=new THREE.Mesh(beaconGeo,beaconMat);
    beacon.position.y=h||30;
    group.add(beacon);

    // Vertical beam
    const beamGeo=new THREE.CylinderGeometry(0.5,0.5,h||30,4);
    const beamMat=new THREE.MeshBasicMaterial({color:color.clone(),transparent:true,opacity:0.15});
    const beam=new THREE.Mesh(beamGeo,beamMat);
    beam.position.y=(h||30)/2;
    group.add(beam);

    landmarkGroup.add(group);
    landmarkPositions.push({key,x,z:lm.z,name:lm.name,color:lm.color,group,h});
}
scene.add(landmarkGroup);

// Stars
const starGeo=new THREE.BufferGeometry();
const starCount=2000;
const starPos=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
    starPos[i*3]=(Math.random()-0.5)*16000;
    starPos[i*3+1]=2000+Math.random()*3000;
    starPos[i*3+2]=(Math.random()-0.5)*16000;
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xaaaacc,size:2,transparent:true,opacity:0.6})));

// Controls UI
const ctrlDiv=document.getElementById('controls');
const btns=[
    {label:'🗼 Tokyo Tower',key:'tokyo_tower'},
    {label:'🏛 Sensō-ji',key:'sensoji'},
    {label:'🌊 Shibuya',key:'shibuya'},
    {label:'🗼 Skytree',key:'skytree'},
    {label:'⛩ Meiji Shrine',key:'meiji'},
    {label:'🏯 Imperial Palace',key:'imperial'},
    {label:'💡 Akihabara',key:'akihabara'},
    {label:'🌆 Shinjuku',key:'shinjuku'},
    {label:'🔄 Reset',key:'reset'}
];

btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.innerHTML=b.label;
    if(b.key==='reset')btn.id='resetBtn';
    btn.onclick=()=>{
        if(b.key==='reset')flyTo(0,400,800,0,0,0);
        else{
            const lm=landmarkPositions.find(l=>l.key===b.key);
            if(lm)flyTo(lm.x,lm.h*1.2+100,lm.z+200,lm.x,lm.h*0.3,lm.z);
        }
    };
    ctrlDiv.appendChild(btn);
});

function flyTo(tx,ty,tz,lx,ly,lz){
    const label=document.getElementById('label');
    const lm=landmarkPositions.find(l=>l.x===tx&&l.z===lz);
    if(lm){label.textContent=lm.name;label.classList.add('show');setTimeout(()=>label.classList.remove('show'),2000);}
    const sx=camera.position.x,sy=camera.position.y,sz=camera.position.z;
    const stx=controls.target.x,sty=controls.target.y,stz=controls.target.z;
    const dur=1500;const start=performance.now();
    function anim(now){
        let t=Math.min((now-start)/dur,1);
        t=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; // ease
        camera.position.set(sx+(tx-sx)*t,sy+(ty-sy)*t,sz+(tz-sz)*t);
        controls.target.set(stx+(lx-stx)*t,sty+(ly-sty)*t,stz+(lz-stz)*t);
        if(t<1)requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
}

// Animate beacon pulsing
let time=0;
function animate(){
    requestAnimationFrame(animate);
    time+=0.02;
    controls.update();
    // Pulse beacons
    landmarkPositions.forEach((lm,i)=>{
        const beacon=lm.group.children[lm.group.children.length-2];
        if(beacon)beacon.material.opacity=0.5+Math.sin(time*2+i)*0.4;
    });
    renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

document.getElementById('loading').classList.add('hide');
animate();
})();
</script>
</body>
</html>
